<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NO XMFD</title>
<!-- ?nochrome — the host already shows the mission name and the ownship grid, so don't draw them
     over the map as well; it keeps the map itself. The F-35 sets it (its master strip carries both,
     from the 'mapinfo' slice this page's own TelemetrySource emits); the bezel doesn't, and renders
     exactly as before. Read inline, before the body, so nothing flashes up and then leaves — see
     the matching note in avn.html. -->
<script>
  if (new URLSearchParams(location.search).has('nochrome')) document.documentElement.classList.add('nochrome');
</script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='1' y='1' width='30' height='30' rx='4' fill='%233b3f45'/><rect x='6' y='6' width='20' height='20' rx='1' fill='%23050a05'/><g fill='%23c8ccd0'><rect x='2.5' y='8' width='2' height='2.5'/><rect x='2.5' y='14.75' width='2' height='2.5'/><rect x='2.5' y='21.5' width='2' height='2.5'/><rect x='27.5' y='8' width='2' height='2.5'/><rect x='27.5' y='14.75' width='2' height='2.5'/><rect x='27.5' y='21.5' width='2' height='2.5'/></g><path d='M11 16h10' stroke='%2339ff14' stroke-width='2' stroke-linecap='square'/></svg>">
<!--
  MAP page — the live map. Served at /map-view (the MFD loads it as the always-on base layer,
  iframe[title=map], /map-view?bare). It is the ONLY EventSource('/stream') in the whole MFD:
  TelemetrySource parses each frame and re-broadcasts the derived per-page slices up to the shell
  via parent.postMessage ({mfd:true, type:'status'|'loadout'|'cm'|'tgp'|'targets'|'rwr'|'mw'|
  'avn'|'follow'}); the shell caches them and re-forwards to the #page-frame (full) or the split
  panes. This page renders ONLY the map: the silhouette + unit icons, the mission-name bar, and
  the GRID chip. (The old standalone header + telemetry sidebar were removed — the dedicated MFD
  pages own that data now, and the shell renders connection status + the FOLLOW indicator.)
-->
<link rel="stylesheet" href="/assets/shared/font.css">
<link rel="stylesheet" href="/assets/shared/theme.css">
<link rel="stylesheet" href="/assets/pages/map/map.css">
</head>
<body>

<main>
  <div id="map-panel">
    <!-- src is intentionally empty: the HTML parser fetches static src= attributes
         directly (bypassing the preview-mock's <img>.src setter override), which
         would 404 against the static preview server. The img is display:none and
         only used as a canvas source — the first telemetry frame assigns the real
         /map URL via JS, which both the game server and the mock can satisfy. -->
    <img id="map-img" alt="">
    <div id="map-missing" class="mfd-empty"><span class="mfd-empty-title">MAP</span>&mdash; NO SIGNAL &mdash;</div>
    <canvas id="overlay"></canvas>
    <div id="mission-bar" class="empty">
      <div class="mission-name" id="mission-name">—</div>
    </div>
    <div id="grid-bar" class="mfd-chip empty">GRID: &mdash;</div>
    <div id="unit-label"></div>
  </div>
</main>

<script src="/assets/services/send-command.js"></script>
<script type="module" src="/assets/pages/map/map.js"></script>
</body>
</html>
