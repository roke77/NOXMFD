<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NO XMFD — TGL</title>
<!--
  Bare TGL page served at /tgl. Single source of truth for the target-list page in BOTH
  layouts — a pure reactive renderer fed by the shell over postMessage. Two profiles share
  this one file:
    compact : split-pane / half-height. Up to 4 targets hug the left/right edges (L1,L2,R1,R2),
              vertical centre pinned to the forwarded slotYs. The default.
    full    : single full-screen iframe. Up to 10 targets in two columns (L1..L5, R1..R5),
              each row spanning its line-select key band (slot top+height forwarded as `slots`).
              Enabled by layout:'full' in the tgl-layout message (adds body.full).

  Shell -> page messages (all {mfd:true, ...}):
    'tgl'        : the (already-sliced) target list — each { n, g, r, f, id }, plus page/pages.
    'tgl-layout' : geometry — compact: slotYs[4]; full: layout:'full' + slots[5] {top,height}.
    'orient'     : app-wide orientation (kept for parity).
  Page -> shell (the declarative softkey contract):
    'softkeys'   : per-target deselect keys [{side, slot, label, action:'target.deselect',
                   data:{id}}]. slot is pane-local (1-based row key); the shell maps it to the
                   physical bezel via slot+paneOffset. Emitted on every render.

  L0 (top-left) is the shell-owned MAIN/PREV nav key; R0 (top-right) the shell-owned NEXT label
  when the target list overflows the page — so targets never use the top band.
-->
<link rel="stylesheet" href="/assets/shared/font.css">
<link rel="stylesheet" href="/assets/shared/theme.css">
<link rel="stylesheet" href="/assets/pages/tgl/tgl.css">
</head>
<body>
  <div class="tgl-panel" id="tgl-panel">
    <div class="tgl-empty" id="tgl-empty" style="text-align:center"><span style="display:block;font-size:30px;letter-spacing:4px;color:#2e7a2e;margin-bottom:.35em">TGL</span>&mdash; NO TARGETS &mdash;</div>
  </div>
  <div id="page-ind" class="empty">PAGE 1/1</div>
<script src="/assets/pages/tgl/tgl.js"></script>
</body>
</html>
